<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Welcome</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: url('images/YogaClass.jpg') center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to right,
        rgba(40,28,20,0.82) 0%,
        transparent 25%,
        transparent 75%,
        rgba(40,28,20,0.82) 100%
      );
      pointer-events: none;
    }
    .back-btn {
      display: block;
      margin-top: 1.5rem;
      font-family: 'Lato', sans-serif;
      font-size: clamp(9px, 0.85vw, 11px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      padding: 0.6rem;
      border-radius: 4px;
      border: 1px solid #c2b9a7;
      color: #3d3028;
      background: transparent;
      transition: all 0.2s ease;
}

.back-btn:hover {
    background: #3d3028;
    color: #f7f3ee;
}
    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(247, 243, 238, 0.94);
      backdrop-filter: blur(3px);
      border: 1px solid rgba(194, 185, 167, 0.4);
      border-radius: 6px;
      padding: clamp(2rem, 4vw, 3rem) clamp(2rem, 5vw, 4rem);
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(61, 48, 40, 0.15);
    }
    .login-card img {
      width: clamp(80px, 12vw, 130px);
      height: auto;
      display: block;
      margin: 0 auto 1.25rem;
    }
    .login-card h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(20px, 2.5vw, 26px);
      color: #3d3028;
      margin: 0 0 0.25rem;
    }
    .tagline {
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px, 0.9vw, 13px);
      color: #9a8e84;
      letter-spacing: 0.06em;
      margin: 0 0 1.75rem;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      border: 1px solid #c2b9a7;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .mode-toggle button {
      flex: 1;
      padding: 0.5rem;
      border: none;
      background: transparent;
      font-family: 'Lato', sans-serif;
      font-size: clamp(9px, 0.85vw, 11px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9a8e84;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .mode-toggle button.active { background: #3d3028; color: #f7f3ee; }
    .mode-toggle button:first-child { border-right: 1px solid #c2b9a7; }

    .login-field { text-align: left; margin-bottom: 1rem; }
    .login-field label {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: clamp(9px, 0.75vw, 11px);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9a8e84;
      margin-bottom: 0.3rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1px solid #c2b9a7;
      border-radius: 4px;
      font-size: clamp(13px, 1vw, 15px);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      background: #faf8f5;
      color: #3d3028;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-field input:focus {
      border-color: #7a8c6e;
      box-shadow: 0 0 0 3px rgba(122, 140, 110, 0.12);
    }
    .login-btn {
      width: 100%;
      padding: 0.65rem;
      margin-top: 0.5rem;
      border-radius: 4px;
      border: none;
      background: #7a8c6e;
      color: #faf8f5;
      font-family: 'Lato', sans-serif;
      font-size: clamp(9px, 0.85vw, 11px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #5a6b50; }
    .error-msg {
      display: none;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #f8e8e8;
      color: #842029;
      border: 1px solid #f1aeb5;
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px, 0.85vw, 13px);
    }
    .success-msg {
      display: none;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #e4ede0;
      color: #3d6b2e;
      border: 1px solid #b2d4a8;
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px, 0.85vw, 13px);
    }
    .password-hint {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      color: #a89e95;
      margin-top: 3px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="images/Logo.png" alt="YogiTrack Logo">
    <h1>YogiTrack</h1>
    <p class="tagline">Studio management by yoga h'om</p>

    <!-- Sign In / Create Account toggle -->
    <div class="mode-toggle">
      <button class="active" id="signinBtn" onclick="setMode('signin')">Sign In</button>
      <button id="registerBtn" onclick="setMode('register')">Create Account</button>
    </div>

    <!-- Sign In Form -->
    <div id="signinForm">
      <div class="login-field">
        <label for="username">Username or Email</label>
        <input type="text" id="username" placeholder="Enter your username or email" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Create Account Form -->
    <div id="registerForm" style="display:none;">
      <div class="login-field">
        <label for="regFirstName">First Name</label>
        <input type="text" id="regFirstName" placeholder="First name">
      </div>
      <div class="login-field">
        <label for="regLastName">Last Name</label>
        <input type="text" id="regLastName" placeholder="Last name">
      </div>
      <div class="login-field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="login-field">
        <label for="regPhone">Phone</label>
        <input type="tel" id="regPhone" placeholder="Phone number">
      </div>
      <div class="login-field">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password" autocomplete="new-password">
        <div class="password-hint">At least 6 characters</div>
      </div>
      <div class="login-field">
        <label for="regPasswordConfirm">Confirm Password</label>
        <input type="password" id="regPasswordConfirm" placeholder="Confirm your password">
      </div>
      <button class="login-btn" onclick="doRegister()">Create Account</button>
    </div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <a href="https://www.yogahom.com/" class="back-btn">
      ← Go back to main website
    </a>
  </div>

  <script>
    let currentMode = 'signin';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('signinBtn').classList.toggle('active', mode === 'signin');
      document.getElementById('registerBtn').classList.toggle('active', mode === 'register');
      document.getElementById('signinForm').style.display   = mode === 'signin'   ? 'block' : 'none';
      document.getElementById('registerForm').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('errorMsg').style.display   = 'none';
      document.getElementById('successMsg').style.display = 'none';
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Please enter your username and password.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          errorMsg.textContent = data.error || 'Invalid username or password.';
          errorMsg.style.display = 'block';
          return;
        }
        window.location.href = data.redirect;
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server. Please try again.';
        errorMsg.style.display = 'block';
      }
    }

    async function doRegister() {
      const firstName       = document.getElementById('regFirstName').value.trim();
      const lastName        = document.getElementById('regLastName').value.trim();
      const email           = document.getElementById('regEmail').value.trim().toLowerCase();
      const phone           = document.getElementById('regPhone').value.trim();
      const password        = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;
      const errorMsg        = document.getElementById('errorMsg');
      const successMsg      = document.getElementById('successMsg');

      errorMsg.style.display   = 'none';
      successMsg.style.display = 'none';

      if (!firstName || !lastName || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password !== passwordConfirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res  = await fetch('/api/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ firstName, lastName, email, phone, password }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          errorMsg.textContent = data.error || 'Registration failed. Please try again.';
          errorMsg.style.display = 'block';
          return;
        }
        successMsg.textContent = `✓ Account created! You can now sign in with your email.`;
        successMsg.style.display = 'block';
        // Clear form and switch to sign in after short delay
        setTimeout(() => {
          document.getElementById('regFirstName').value       = '';
          document.getElementById('regLastName').value        = '';
          document.getElementById('regEmail').value           = '';
          document.getElementById('regPhone').value           = '';
          document.getElementById('regPassword').value        = '';
          document.getElementById('regPasswordConfirm').value = '';
          setMode('signin');
          document.getElementById('username').value = email;
        }, 2000);
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server. Please try again.';
        errorMsg.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (currentMode === 'signin') doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
