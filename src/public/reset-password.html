<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: url('images/YogaClass.jpg') center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to right,
        rgba(40,28,20,0.82) 0%, transparent 25%,
        transparent 75%, rgba(40,28,20,0.82) 100%
      );
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(247,243,238,0.96);
      border: 1px solid rgba(194,185,167,0.4);
      border-radius: 6px;
      padding: clamp(2rem,4vw,3rem) clamp(2rem,5vw,4rem);
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(61,48,40,0.15);
    }
    .card img { width: clamp(70px,10vw,110px); display:block; margin:0 auto 1rem; }
    .card h1 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(18px,2vw,24px); color:#3d3028; margin:0 0 0.25rem; }
    .card p.sub { font-family:'Lato',sans-serif; font-size:12px; color:#9a8e84; margin:0 0 1.75rem; }
    .field { text-align:left; margin-bottom:1rem; }
    .field label { display:block; font-family:'Lato',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:#9a8e84; margin-bottom:0.3rem; }
    .field input { width:100%; padding:0.6rem 0.85rem; border:1px solid #c2b9a7; border-radius:4px; font-size:14px; font-family:'Lato',sans-serif; background:#faf8f5; color:#3d3028; outline:none; box-sizing:border-box; transition:border-color 0.2s; }
    .field input:focus { border-color:#7a8c6e; box-shadow:0 0 0 3px rgba(122,140,110,0.12); }
    .btn { width:100%; padding:0.65rem; margin-top:0.5rem; border-radius:4px; border:none; background:#7a8c6e; color:#faf8f5; font-family:'Lato',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; transition:background 0.2s; }
    .btn:hover { background:#5a6b50; }
    .hint { font-family:'Lato',sans-serif; font-size:10px; color:#a89e95; margin-top:3px; text-align:left; }
    .msg { display:none; margin-top:0.75rem; padding:0.5rem 0.75rem; border-radius:4px; font-family:'Lato',sans-serif; font-size:12px; }
    .msg.error   { background:#f8e8e8; color:#842029; border:1px solid #f1aeb5; }
    .msg.success { background:#e4ede0; color:#3d6b2e; border:1px solid #b2d4a8; }
    .back { display:block; margin-top:1rem; font-family:'Lato',sans-serif; font-size:11px; color:#9a8e84; text-decoration:none; }
    .back:hover { color:#b5724a; }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/Logo.png" alt="YogiTrack">
    <h1>Reset Password</h1>
    <p class="sub">Enter your new password below</p>

    <div id="resetForm">
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Choose a new password" autocomplete="new-password">
        <div class="hint">At least 6 characters</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password">
      </div>
      <button class="btn" onclick="doReset()">Set New Password</button>
    </div>

    <div id="invalidToken" style="display:none;">
      <p style="font-family:'Lato',sans-serif; font-size:13px; color:#842029;">This reset link is invalid or has expired.</p>
      <a href="index.html" style="font-family:'Lato',sans-serif; font-size:12px; color:#b5724a;">← Back to Sign In</a>
    </div>

    <div class="msg" id="msg"></div>
    <a href="index.html" class="back">← Back to Sign In</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('resetForm').style.display   = 'none';
      document.getElementById('invalidToken').style.display = 'block';
    }

    async function doReset() {
      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msg             = document.getElementById('msg');

      msg.style.display = 'none';

      if (!newPassword) {
        showMsg('Please enter a new password.', false); return;
      }
      if (newPassword.length < 6) {
        showMsg('Password must be at least 6 characters.', false); return;
      }
      if (newPassword !== confirmPassword) {
        showMsg('Passwords do not match.', false); return;
      }

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password: newPassword }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          showMsg(data.error || 'Reset failed. Please try again.', false); return;
        }
        showMsg('✓ Password updated! Redirecting to sign in…', true);
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => window.location.href = '/index.html', 2500);
      } catch (err) {
        showMsg('Could not connect. Please try again.', false);
      }
    }

    function showMsg(text, success) {
      const msg = document.getElementById('msg');
      msg.textContent  = text;
      msg.className    = `msg ${success ? 'success' : 'error'}`;
      msg.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  </script>
</body>
</html>
