<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Check-ins</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="page-shell">

    <a class="wing-brand" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">Studio Manager</span>
    </a>

    <div class="center-col">

      <nav class="topnav">
        <div class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="instructor.html">Instructors</a>
          <a href="package.html">Packages</a>
          <a href="schedule.html">Schedule</a>
          <a href="customer.html">Customers</a>
          <a href="checkin.html" class="active">Check-ins</a>
          <a href="reports.html">Reports</a>
        </div>
        <a href="#" class="nav-logout" onclick="doLogout()">Log out</a>
      </nav>

      <div class="content-panel">

        <form class="card card--wide" id="checkinForm">
          <h2>Log Check-in</h2>

          <div class="grid-2">
            <label>Customer
              <select name="customerId" id="customerSelect" class="form-input styled-select" required>
                <option value="">-- Select Customer --</option>
              </select>
            </label>
            <label>Class
              <select name="classId" id="classSelect" class="form-input styled-select" required>
                <option value="">-- Select Class --</option>
              </select>
            </label>
          </div>

          <div class="grid-2">
            <label>Instructor
              <select name="instructorId" id="instructorSelect" class="form-input styled-select" required>
                <option value="">-- Select Instructor --</option>
              </select>
            </label>
            <label>Date &amp; Time
              <input type="datetime-local" name="checkinDatetime" id="checkinDatetime" required>
            </label>
          </div>

          <div id="validationBanner"></div>

          <div class="btn-row">
            <button type="button" class="btn btn--primary" id="saveCheckinBtn">Save Check-in</button>
            <button type="button" class="btn" onclick="clearCheckinForm()">Clear</button>
            <a href="dashboard.html" class="btn">Exit</a>
          </div>
        </form>

        <div class="table-wrap">
          <div class="table-header">
            <h2>Past Check-ins</h2>
            <div class="search-bar">
              <input type="text" id="searchInput" placeholder="Search customer or class…">
              <select id="filterInstructor">
                <option value="">All Instructors</option>
              </select>
              <input type="date" id="filterDate">
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Class</th>
                <th>Instructor</th>
                <th>Date &amp; Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="checkinTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" style="display:none;">No check-ins found.</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    (async function() {
      const res  = await fetch('/api/auth/me');
      const data = await res.json();
      if (!data.loggedIn || data.user.role !== 'staff') {
        window.location.href = '/index.html';
      }
    })();

    function doLogout() {
      fetch('/api/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/index.html');
    }
  </script>
  <script src="../js/checkin.js"></script>
</body>
</html>
