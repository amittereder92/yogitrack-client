<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Check-ins</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="page-shell">

    <a class="wing-brand" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">Studio Manager</span>
    </a>

    <div class="center-col">

      <nav class="topnav">
        <div class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="instructor.html">Instructors</a>
          <a href="package.html">Packages</a>
          <a href="schedule.html">Schedule</a>
          <a href="customer.html">Customers</a>
          <a href="checkin.html" class="active">Check-ins</a>
        </div>
        <a href="../index.html" class="nav-logout">Log out</a>
      </nav>

      <div class="content-panel">

        <!-- Log New Check-in Form -->
        <form class="card card--wide" id="checkinForm">
          <h2>Log Check-in</h2>

          <div class="grid-2">
            <label>Customer
              <select name="customerId" id="customerSelect" class="form-input styled-select" required>
                <option value="">-- Select Customer --</option>
              </select>
            </label>
            <label>Class
              <select name="classId" id="classSelect" class="form-input styled-select" required>
                <option value="">-- Select Class --</option>
              </select>
            </label>
          </div>

          <div class="grid-2">
            <label>Instructor
              <select name="instructorId" id="instructorSelect" class="form-input styled-select" required>
                <option value="">-- Select Instructor --</option>
              </select>
            </label>
            <label>Date &amp; Time
              <input type="datetime-local" name="checkinDatetime" id="checkinDatetime" required>
            </label>
          </div>

          <div id="validationBanner"></div>

          <div class="btn-row">
            <button type="button" class="btn btn--primary" id="saveCheckinBtn">Save Check-in</button>
            <button type="button" class="btn" onclick="clearCheckinForm()">Clear</button>
            <a href="dashboard.html" class="btn">Exit</a>
          </div>
        </form>

        <!-- Past Check-ins Table -->
        <div class="table-wrap">
          <div class="table-header">
            <h2>Past Check-ins</h2>
            <div class="search-bar">
              <input type="text" id="searchInput" placeholder="Search customer or class…" oninput="renderTable()">
              <select id="filterInstructor" onchange="renderTable()">
                <option value="">All Instructors</option>
              </select>
              <input type="date" id="filterDate" onchange="renderTable()">
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Class</th>
                <th>Instructor</th>
                <th>Date &amp; Time</th>
                <th>Package Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="checkinTableBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" style="display:none;">No check-ins found.</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const CUSTOMERS = [
      { id: 'C001', name: 'Alice Martin',  balance: 8  },
      { id: 'C002', name: 'Ben Torres',    balance: 1  },
      { id: 'C003', name: 'Clara Nguyen',  balance: 0  },
      { id: 'C004', name: 'David Kim',     balance: 15 },
    ];

    const CLASSES = [
      { id: 'CL01', name: 'Morning Flow'  },
      { id: 'CL02', name: 'Power Vinyasa' },
      { id: 'CL03', name: 'Prenatal Yoga' },
      { id: 'CL04', name: 'Restorative'   },
    ];

    const INSTRUCTORS = [
      { id: 'I001', name: 'Sara Patel' },
      { id: 'I002', name: 'James Lee'  },
      { id: 'I003', name: 'Mia Chen'   },
    ];

    let checkins = JSON.parse(localStorage.getItem('yogiCheckins') || '[]');

    function populateDropdowns() {
      const cSel = document.getElementById('customerSelect');
      CUSTOMERS.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = `${c.name} (${c.id})`;
        cSel.appendChild(o);
      });

      const clSel = document.getElementById('classSelect');
      CLASSES.forEach(cl => {
        const o = document.createElement('option');
        o.value = cl.id;
        o.textContent = cl.name;
        clSel.appendChild(o);
      });

      const iSel    = document.getElementById('instructorSelect');
      const iFilter = document.getElementById('filterInstructor');
      INSTRUCTORS.forEach(i => {
        const o = document.createElement('option');
        o.value = i.id;
        o.textContent = i.name;
        iSel.appendChild(o.cloneNode(true));
        iFilter.appendChild(o);
      });

      const now = new Date();
      now.setSeconds(0, 0);
      document.getElementById('checkinDatetime').value = now.toISOString().slice(0, 16);
    }

    function validatePackage() {
      const customerId = document.getElementById('customerSelect').value;
      const banner = document.getElementById('validationBanner');
      if (!customerId) { banner.style.display = 'none'; return; }
      const customer = CUSTOMERS.find(c => c.id === customerId);
      banner.style.display = 'block';
      if (customer.balance === 0) {
        banner.className = 'err';
        banner.textContent = `⚠ ${customer.name} has no remaining classes. Please update their package before checking in.`;
      } else if (customer.balance <= 2) {
        banner.className = 'warn';
        banner.textContent = `⚠ ${customer.name} has only ${customer.balance} class(es) remaining — consider renewing their package.`;
      } else {
        banner.className = 'ok';
        banner.textContent = `✓ ${customer.name} has ${customer.balance} class(es) remaining.`;
      }
    }

    document.getElementById('customerSelect').addEventListener('change', validatePackage);

    document.getElementById('saveCheckinBtn').addEventListener('click', () => {
      const customerId   = document.getElementById('customerSelect').value;
      const classId      = document.getElementById('classSelect').value;
      const instructorId = document.getElementById('instructorSelect').value;
      const datetime     = document.getElementById('checkinDatetime').value;
      if (!customerId || !classId || !instructorId || !datetime) {
        alert('Please fill in all fields before saving.');
        return;
      }
      const customer = CUSTOMERS.find(c => c.id === customerId);
      if (customer.balance === 0) {
        if (!confirm(`${customer.name} has no remaining classes. Save check-in anyway?`)) return;
      }
      const checkin = {
        id: Date.now(), customerId, classId, instructorId, datetime,
        customerName:   customer.name,
        className:      CLASSES.find(c => c.id === classId).name,
        instructorName: INSTRUCTORS.find(i => i.id === instructorId).name,
        balanceAtCheckin: customer.balance,
      };
      if (customer.balance > 0) customer.balance--;
      checkins.unshift(checkin);
      localStorage.setItem('yogiCheckins', JSON.stringify(checkins));
      clearCheckinForm();
      renderTable();
      alert('Check-in saved successfully!');
    });

    function clearCheckinForm() {
      document.getElementById('customerSelect').value   = '';
      document.getElementById('classSelect').value      = '';
      document.getElementById('instructorSelect').value = '';
      const now = new Date(); now.setSeconds(0, 0);
      document.getElementById('checkinDatetime').value  = now.toISOString().slice(0, 16);
      const banner = document.getElementById('validationBanner');
      banner.style.display = 'none';
      banner.className = '';
    }

    function deleteCheckin(id) {
      if (!confirm('Delete this check-in?')) return;
      checkins = checkins.filter(c => c.id !== id);
      localStorage.setItem('yogiCheckins', JSON.stringify(checkins));
      renderTable();
    }

    function renderTable() {
      const search     = document.getElementById('searchInput').value.toLowerCase();
      const instructor = document.getElementById('filterInstructor').value;
      const date       = document.getElementById('filterDate').value;
      const filtered   = checkins.filter(c => {
        const matchSearch     = !search     || c.customerName.toLowerCase().includes(search) || c.className.toLowerCase().includes(search);
        const matchInstructor = !instructor || c.instructorId === instructor;
        const matchDate       = !date       || c.datetime.startsWith(date);
        return matchSearch && matchInstructor && matchDate;
      });
      const tbody = document.getElementById('checkinTableBody');
      const empty = document.getElementById('emptyState');
      tbody.innerHTML = '';
      if (filtered.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      filtered.forEach(c => {
        let badgeClass = 'badge--valid';
        let badgeLabel = `${c.balanceAtCheckin} remaining`;
        if (c.balanceAtCheckin === 0)     { badgeClass = 'badge--expired'; badgeLabel = 'No classes'; }
        else if (c.balanceAtCheckin <= 2) { badgeClass = 'badge--low';     badgeLabel = `Low (${c.balanceAtCheckin})`; }
        const dt        = new Date(c.datetime);
        const formatted = dt.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.customerName}</td>
          <td>${c.className}</td>
          <td>${c.instructorName}</td>
          <td>${formatted}</td>
          <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
          <td><button class="btn btn--danger" style="padding:.3rem .7rem; font-size:.8rem;" onclick="deleteCheckin(${c.id})">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    populateDropdowns();
    renderTable();
  </script>

</body>
</html>
