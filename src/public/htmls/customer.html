<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack • Customers</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="layout--sidebar">
  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo" class="logo">
    </a>
    <nav class="nav">
      <a href="instructor.html">Instructors</a>
      <a href="package.html">Packages</a>
      <a href="schedule.html">Class Schedule</a>
      <a href="customer.html" class="active">Customers</a>
      <a href="checkin.html">Check-ins</a>
      <a href="../index.html">Log Out</a>
    </nav>
  </aside>

  <main class="layout--center">
    <form class="card card--wide" id="customerForm">
      <h2>Customer Details</h2>

      <!-- Customer ID dropdown (search mode) -->
      <label id="customerIdLabel" for="customerIdSelect">Customer ID
        <select name="customerId" id="customerIdSelect" class="form-input">
          <option value=""> -- Select Customer -- </option>
        </select>
      </label>

      <!-- Customer ID text (add mode) -->
      <label id="customerIdTextLabel" style="display:none;">Customer ID</label>
      <input type="text" id="customerIdText" name="customerId" readonly hidden />

      <div class="grid-2">
        <label>First Name
          <input type="text" name="firstName" id="firstName">
        </label>
        <label>Last Name
          <input type="text" name="lastName" id="lastName">
        </label>
      </div>

      <label>Address
        <textarea name="address" id="address" rows="2"></textarea>
      </label>

      <div class="grid-2">
        <label>Phone
          <input type="tel" name="phone" id="phone">
        </label>
        <label>Email
          <input type="email" name="email" id="email">
        </label>
      </div>

      <div class="grid-2">
        <label>Class Balance
          <input type="number" name="classBalance" id="classBalance" min="0">
        </label>
        <fieldset>
          <legend>Senior (62+)</legend>
          <div class="radio-row">
            <label><input type="radio" name="senior" value="true"> Yes</label>
            <label><input type="radio" name="senior" value="false" checked> No</label>
          </div>
        </fieldset>
      </div>

      <fieldset>
        <legend>Preferred Contact</legend>
        <div class="radio-row">
          <label><input type="radio" name="preferredContact" value="phone"> Phone</label>
          <label><input type="radio" name="preferredContact" value="email"> Email</label>
        </div>
      </fieldset>

      <div class="btn-row">
        <button type="button" class="btn" id="searchBtn">Search</button>
        <button type="button" class="btn btn--primary" id="addBtn">Add&nbsp;New</button>
        <button type="button" class="btn" id="saveBtn">Save</button>
        <button type="button" class="btn btn--danger" id="deleteBtn">Delete</button>
        <button type="button" class="btn" onclick="clearCustomerForm()">Clear</button>
        <a href="dashboard.html" class="btn">Exit</a>
      </div>
    </form>
  </main>

  <script src="../js/customer.js"></script>
</body>
</html>
