<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Customers</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/choices.js/10.2.0/choices.min.css">
  <style>
    .choices__inner { background:#faf8f5; border:1px solid #c2b9a7; border-radius:4px; padding:0.4rem 0.6rem; font-family:'Lato',sans-serif; font-size:clamp(13px,1vw,15px); font-weight:300; color:#3d3028; min-height:unset; }
    .choices__inner:focus-within { border-color:#7a8c6e; box-shadow:0 0 0 3px rgba(122,140,110,0.12); }
    .choices__list--dropdown { border:1px solid #c2b9a7; border-radius:4px; background:#faf8f5; font-family:'Lato',sans-serif; z-index:100; }
    .choices__list--dropdown .choices__item--selectable { font-size:13px; color:#3d3028; padding:8px 12px; }
    .choices__list--dropdown .choices__item--selectable.is-highlighted { background:#ede8e0; color:#3d3028; }
    .choices__input { font-family:'Lato',sans-serif; font-size:13px; background:#faf8f5; color:#3d3028; }
    .choices[data-type*=select-one] .choices__inner { padding-right:2rem; }
    .choices__placeholder { color:#9a8e84; }
    .choices__list--single { padding:0; }
    .choices__list--single .choices__item { font-size:13px; color:#3d3028; }
    .inactive-badge { display:inline-block; background:#f5ece4; color:#8f5535; font-family:'Lato',sans-serif; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:4px; margin-left:8px; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="page-shell">
    <a class="wing-brand" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">Studio Manager</span>
    </a>
    <div class="center-col">
      <nav class="topnav">
        <div class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="instructor.html">Instructors</a>
          <a href="package.html">Packages</a>
          <a href="schedule.html">Schedule</a>
          <a href="customer.html" class="active">Customers</a>
          <a href="checkin.html">Check-ins</a>
          <a href="reports.html">Reports</a>
        </div>
        <a href="#" class="nav-logout" onclick="doLogout()">Log out</a>
      </nav>

      <div class="content-panel">
        <form class="card card--wide" id="customerForm">
          <h2>Customer Details <span id="inactiveBadge" class="inactive-badge" style="display:none;">Inactive</span></h2>

          <label id="customerIdLabel">Customer ID
            <select name="customerId" id="customerIdSelect" class="form-input">
              <option value="">-- Select Customer --</option>
            </select>
          </label>

          <label id="customerIdTextLabel" style="display:none;">Customer ID</label>
          <input type="text" id="customerIdText" name="customerId" readonly hidden />

          <div class="grid-2">
            <label>First Name <input type="text" name="firstName" id="firstName"></label>
            <label>Last Name  <input type="text" name="lastName"  id="lastName"></label>
          </div>

          <label>Address <textarea name="address" id="address" rows="2"></textarea></label>

          <div class="grid-2">
            <label>Phone <input type="tel"   name="phone" id="phone"></label>
            <label>Email <input type="email" name="email" id="email"></label>
          </div>

          <div class="grid-2">
            <label>Class Balance
              <input type="number" name="classBalance" id="classBalance" min="0">
            </label>
            <fieldset>
              <legend>Senior (62+)</legend>
              <div class="radio-row">
                <label><input type="radio" name="senior" value="true"> Yes</label>
                <label><input type="radio" name="senior" value="false" checked> No</label>
              </div>
            </fieldset>
          </div>

          <fieldset>
            <legend>Preferred Contact</legend>
            <div class="radio-row">
              <label><input type="radio" name="preferredContact" value="phone"> Phone</label>
              <label><input type="radio" name="preferredContact" value="email"> Email</label>
            </div>
          </fieldset>

          <label id="portalRoleLabel">Portal Role
            <select id="portalRole" class="form-input styled-select">
              <option value="customer">Customer</option>
              <option value="instructor">Instructor</option>
              <option value="staff">Admin / Staff</option>
            </select>
          </label>

          <div class="btn-row" id="staffBtns">
            <button type="button" class="btn" id="searchBtn">Search</button>
            <button type="button" class="btn btn--primary" id="addBtn">Add New</button>
            <button type="button" class="btn" id="saveBtn">Save</button>
            <button type="button" class="btn btn--danger" id="deleteBtn">Delete</button>
            <button type="button" class="btn" id="deactivateBtn" style="display:none; background:#b5724a; color:#faf8f5; border-color:#b5724a;">Deactivate</button>
            <button type="button" class="btn" id="reactivateBtn" style="display:none; background:#7a8c6e; color:#faf8f5; border-color:#7a8c6e;">Reactivate</button>
            <button type="button" class="btn" onclick="clearCustomerForm()">Clear</button>
            <a href="dashboard.html" class="btn">Exit</a>
          </div>

          <div class="btn-row" id="instructorBtns" style="display:none;">
            <button type="button" class="btn" id="instrSearchBtn">Search</button>
            <button type="button" class="btn" onclick="clearCustomerForm()">Clear</button>
            <a href="../htmls/instructor-portal.html" class="btn">Exit</a>
          </div>
        </form>

        <!-- Package Sale Section -->
        <div class="card card--wide" id="packageSaleSection" style="display:none;">
          <h2>Sell Package</h2>
          <p id="saleCustomerName" style="font-family:'Lato',sans-serif; font-size:13px; color:#7a8c6e; margin:-0.5rem 0 1rem;"></p>

          <div class="grid-2">
            <label>Package
              <select id="salePackageSelect" class="form-input styled-select" onchange="onPackageSelected()">
                <option value="">-- Select Package --</option>
              </select>
            </label>
            <label id="saleClassesLabel">Classes to Add
              <input type="number" id="saleClassesCount" min="1" class="form-input" placeholder="0">
            </label>
          </div>

          <div id="salePaymentSection">
            <div class="grid-2">
              <label>Amount Paid ($)
                <input type="number" id="saleAmountPaid" min="0" step="0.01" class="form-input" placeholder="0.00">
              </label>
              <label>Payment Method
                <select id="salePaymentMethod" class="form-input styled-select">
                  <option value="cash">Cash</option>
                  <option value="card">Card</option>
                </select>
              </label>
            </div>
          </div>

          <div id="saleFeedback" style="display:none; margin-bottom:1rem; padding:0.6rem 0.85rem; border-radius:4px; font-family:'Lato',sans-serif; font-size:13px;"></div>

          <div class="btn-row">
            <button type="button" class="btn btn--primary" onclick="sellPackage()">Sell Package</button>
            <button type="button" class="btn" onclick="clearSaleForm()">Clear</button>
          </div>

          <div style="margin-top:1.5rem;">
            <h3 style="font-family:'Fraunces',serif; font-weight:400; font-size:clamp(14px,1.2vw,17px); color:#3d3028; margin:0 0 0.75rem;">Purchase History</h3>
            <table>
              <thead>
                <tr><th>Date</th><th>Package</th><th>Classes</th><th>Amount</th><th>Method</th></tr>
              </thead>
              <tbody id="saleHistoryBody"></tbody>
            </table>
            <div id="saleHistoryEmpty" style="font-family:'Lato',sans-serif; font-size:12px; color:#c2b9a7; font-style:italic; padding:8px 0; display:none;">No purchases yet.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/choices.js/10.2.0/choices.min.js"></script>
  <script>
    let currentUserRole = 'staff';

    (async function() {
      const res  = await fetch('/api/auth/me');
      const data = await res.json();
      if (!data.loggedIn || (data.user.role !== 'staff' && data.user.role !== 'instructor')) {
        window.location.href = '/index.html';
        return;
      }
      currentUserRole = data.user.role;

      if (currentUserRole === 'instructor') {
        document.getElementById('staffBtns').style.display       = 'none';
        document.getElementById('instructorBtns').style.display  = 'flex';
        document.getElementById('portalRoleLabel').style.display = 'none';
        document.getElementById('saleClassesLabel').style.display   = 'none';
        document.getElementById('salePaymentSection').style.display = 'none';
        ['firstName','lastName','email','phone','address','classBalance'].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.readOnly = true; el.style.background = '#f0ebe4'; }
        });
      }
    })();

    function doLogout() {
      fetch('/api/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/index.html');
    }
  </script>
  <script src="../js/customer.js"></script>
</body>
</html>
