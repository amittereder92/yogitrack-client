<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Instructors</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="page-shell">

    <a class="wing-brand" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">Studio Manager</span>
    </a>

    <div class="center-col">

      <nav class="topnav">
        <div class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="instructor.html" class="active">Instructors</a>
          <a href="package.html">Packages</a>
          <a href="schedule.html">Schedule</a>
          <a href="customer.html">Customers</a>
          <a href="checkin.html">Check-ins</a>
          <a href="reports.html">Reports</a>
        </div>
        <a href="#" class="nav-logout" onclick="doLogout()">Log out</a>
      </nav>

      <div class="content-panel">
        <form class="card card--wide" id="instructorForm">
          <h2>Instructor Details</h2>
          <p style="font-family:'Lato',sans-serif; font-size:11px; color:#9a8e84; margin:-0.5rem 0 1rem; letter-spacing:0.04em;">
            Instructors are customers with the Instructor role. To add an instructor, go to the
            <a href="customer.html" style="color:#b5724a;">Customers</a> page and set their Portal Role to Instructor.
          </p>

          <label id="instructorIdLabel" for="instructorIdSelect">Select Instructor
            <select id="instructorIdSelect" class="form-input">
              <option value="">-- Select Instructor --</option>
            </select>
          </label>

          <div class="grid-2">
            <label>First Name <input type="text" id="firstName" readonly style="background:#f0ebe4;"></label>
            <label>Last Name  <input type="text" id="lastName"  readonly style="background:#f0ebe4;"></label>
          </div>

          <label>Address <textarea id="address" rows="2"></textarea></label>

          <div class="grid-2">
            <label>Phone <input type="tel"   id="phone"></label>
            <label>Email <input type="email" id="email" readonly style="background:#f0ebe4;"></label>
          </div>

          <fieldset>
            <legend>Preferred Contact</legend>
            <div class="radio-row">
              <label><input type="radio" name="pref" value="phone"> Phone</label>
              <label><input type="radio" name="pref" value="email"> Email</label>
            </div>
          </fieldset>

          <div class="btn-row">
            <button type="button" class="btn btn--primary" id="saveBtn">Save</button>
            <button type="button" class="btn btn--danger" id="removeRoleBtn">Remove Instructor Role</button>
            <button type="button" class="btn" onclick="clearForm()">Clear</button>
            <a href="dashboard.html" class="btn">Exit</a>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script>
    (async function() {
      const res  = await fetch('/api/auth/me');
      const data = await res.json();
      if (!data.loggedIn || data.user.role !== 'staff') {
        window.location.href = '/index.html';
      }
    })();

    function doLogout() {
      fetch('/api/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/index.html');
    }
  </script>
  <script src="../js/instructor.js"></script>
</body>
</html>
