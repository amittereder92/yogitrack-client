<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Packages</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="page-shell">

    <a class="wing-brand" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">Studio Manager</span>
    </a>

    <div class="center-col">

      <nav class="topnav">
        <div class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="instructor.html">Instructors</a>
          <a href="package.html" class="active">Packages</a>
          <a href="schedule.html">Schedule</a>
          <a href="customer.html">Customers</a>
          <a href="checkin.html">Check-ins</a>
          <a href="reports.html">Reports</a>
        </div>
        <a href="#" class="nav-logout" onclick="doLogout()">Log out</a>
      </nav>

      <div class="content-panel">
        <form class="card" id="packageForm">
          <h2>Package Details</h2>

          <label id="packageIdLabel" for="packageIdSelect">Package ID
            <select name="packageId" id="packageIdSelect" class="form-input">
              <option value="">-- Select Package --</option>
            </select>
          </label>

          <label id="packageIdTextLabel" style="display:none;">Package ID</label>
          <input type="text" id="packageIdText" name="packageId" readonly hidden />

          <label>Package Name <input type="text" name="packageName" id="packageName"></label>
          <label>Description  <textarea name="description" id="description" rows="2"></textarea></label>

          <div class="grid-2">
            <label>Price ($) <input type="number" name="price" id="price" step="0.01" min="0"></label>
            <label>Number of Classes <input type="number" name="classCount" id="classCount" min="1" placeholder="e.g. 10"></label>
          </div>

          <div class="btn-row">
            <button type="button" class="btn" id="searchBtn">Search</button>
            <button type="button" class="btn btn--primary" id="addBtn">Add New</button>
            <button type="button" class="btn" id="saveBtn">Save</button>
            <button type="button" class="btn btn--danger" id="deleteBtn">Delete</button>
            <button type="button" class="btn" onclick="clearPackageForm()">Clear</button>
            <a href="dashboard.html" class="btn">Exit</a>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script>
    (async function() {
      const res  = await fetch('/api/auth/me');
      const data = await res.json();
      if (!data.loggedIn || data.user.role !== 'staff') {
        window.location.href = '/index.html';
      }
    })();

    function doLogout() {
      fetch('/api/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/index.html');
    }
  </script>
  <script src="../js/package.js"></script>
</body>
</html>
