<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • Class Schedule</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .inactive-badge { display:inline-block; background:#f5ece4; color:#8f5535; font-family:'Lato',sans-serif; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:4px; margin-left:8px; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="page-shell">
    <a class="wing-brand" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">Studio Manager</span>
    </a>
    <div class="center-col">
      <nav class="topnav">
        <div class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="instructor.html">Instructors</a>
          <a href="package.html">Packages</a>
          <a href="schedule.html" class="active">Schedule</a>
          <a href="customer.html">Customers</a>
          <a href="checkin.html">Check-ins</a>
          <a href="reports.html">Reports</a>
        </div>
        <a href="#" class="nav-logout" onclick="doLogout()">Log out</a>
      </nav>

      <div class="content-panel">
        <form class="card card--wide" id="scheduleForm">
          <h2>Class Schedule <span id="inactiveBadge" class="inactive-badge" style="display:none;">Inactive</span></h2>

          <label id="classIdLabel" for="classIdSelect">Class ID
            <select name="classId" id="classIdSelect" class="form-input">
              <option value="">-- Select Class --</option>
            </select>
          </label>

          <label id="classIdTextLabel" style="display:none;">Class ID</label>
          <input type="text" id="classIdText" name="classId" readonly hidden />

          <div class="grid-2">
            <label>Class Name
              <input type="text" name="className" id="className">
            </label>
            <label>Class Type
              <select name="classType" id="classType" class="form-input styled-select">
                <option value="">-- Select Type --</option>
                <option value="General">General</option>
                <option value="Special">Special</option>
                <option value="Prenatal">Prenatal</option>
                <option value="Private">Private</option>
              </select>
            </label>
          </div>

          <label>Instructor
            <select name="instructorId" id="instructorId" class="form-input styled-select">
              <option value="">-- Select Instructor --</option>
            </select>
          </label>

          <label>Description
            <textarea name="description" id="description" rows="2"></textarea>
          </label>

          <fieldset>
            <legend>Schedule</legend>
            <div id="daytimeList"></div>
            <button type="button" class="btn" id="addDaytimeBtn" style="margin-top:.75rem;">+ Add Day/Time</button>
          </fieldset>

          <div class="btn-row">
            <button type="button" class="btn" id="searchBtn">Search</button>
            <button type="button" class="btn btn--primary" id="addBtn">Add New</button>
            <button type="button" class="btn" id="saveBtn">Save</button>
            <button type="button" class="btn btn--danger" id="deleteBtn">Delete</button>
            <button type="button" class="btn" id="deactivateBtn" style="display:none; background:#b5724a; color:#faf8f5; border-color:#b5724a;">Deactivate</button>
            <button type="button" class="btn" id="reactivateBtn" style="display:none; background:#7a8c6e; color:#faf8f5; border-color:#7a8c6e;">Reactivate</button>
            <button type="button" class="btn" id="generateQrBtn" style="background:#b5724a; color:#faf8f5; border-color:#b5724a;">&#9641; QR Code</button>
            <button type="button" class="btn" onclick="clearScheduleForm()">Clear</button>
            <a href="dashboard.html" class="btn">Exit</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (async function() {
      const res  = await fetch('/api/auth/me');
      const data = await res.json();
      if (!data.loggedIn || data.user.role !== 'staff') {
        window.location.href = '/index.html';
      }
    })();

    function doLogout() {
      fetch('/api/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/index.html');
    }
  </script>
  <script src="../js/schedule.js"></script>
</body>
</html>
