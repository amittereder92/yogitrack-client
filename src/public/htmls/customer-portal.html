<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YogiTrack • My Portal</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .portal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 700px;
    }
    .portal-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      border: 1px solid rgba(194,185,167,0.4);
      box-shadow: 0 2px 12px rgba(61,48,40,0.06);
    }
    .portal-card h3 {
      font-family: 'Fraunces', serif;
      font-size: clamp(14px, 1.2vw, 18px);
      color: #3d3028;
      margin: 0 0 12px;
      font-weight: 400;
    }
    .balance-number {
      font-family: 'Fraunces', serif;
      font-size: clamp(36px, 4vw, 52px);
      color: #7a8c6e;
      font-weight: 300;
      line-height: 1;
    }
    .balance-label {
      font-family: 'Lato', sans-serif;
      font-size: clamp(9px, 0.8vw, 11px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9a8e84;
      margin-top: 4px;
    }
    .balance-low   { color: #b5724a; }
    .balance-empty { color: #842029; }

    .checkin-list { list-style: none; margin: 0; padding: 0; }
    .checkin-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(237,232,224,0.9);
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px, 0.9vw, 13px);
    }
    .checkin-item:last-child { border-bottom: none; }
    .checkin-class { color: #3d3028; }
    .checkin-date  { color: #9a8e84; font-size: clamp(10px, 0.8vw, 12px); }

    .empty-msg {
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px, 0.9vw, 13px);
      color: #9a8e84;
      font-style: italic;
      text-align: center;
      padding: 12px 0;
    }

    .welcome-name {
      font-family: 'Fraunces', serif;
      font-size: clamp(18px, 2vw, 24px);
      color: #3d3028;
      font-weight: 300;
      margin-bottom: 20px;
    }

    /* ── Schedule day-by-day ── */
    .schedule-page { width: 100%; }
    .day-block { margin-bottom: 24px; }
    .day-heading {
      font-family: 'Lato', sans-serif;
      font-size: clamp(10px, 0.85vw, 12px);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3d3028;
      padding-bottom: 8px;
      border-bottom: 1.5px solid #3d3028;
      margin-bottom: 0;
    }
    .schedule-table { width: 100%; border-collapse: collapse; }
    .schedule-table th {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9a8e84;
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(194,185,167,0.3);
      background: transparent;
      font-weight: 500;
    }
    .schedule-table td {
      font-family: 'Lato', sans-serif;
      font-size: clamp(12px, 1vw, 14px);
      color: #3d3028;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(237,232,224,0.8);
      vertical-align: middle;
      background: transparent;
    }
    .schedule-table tr:last-child td { border-bottom: none; }
    .schedule-table tr:hover td { background: rgba(237,232,224,0.4); }
    .class-type-tag {
      display: inline-block;
      font-size: 9px;
      padding: 1px 7px;
      border-radius: 8px;
      background: #e4ede0;
      color: #3d6b2e;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.06em;
      margin-left: 6px;
      vertical-align: middle;
    }
    .no-classes {
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      color: #c2b9a7;
      font-style: italic;
      padding: 10px 0;
    }

    /* Profile */
    .profile-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(237,232,224,0.9);
      font-family: 'Lato', sans-serif;
      font-size: clamp(11px, 0.9vw, 13px);
    }
    .profile-row:last-child { border-bottom: none; }
    .profile-label { color: #9a8e84; }
    .profile-value { color: #3d3028; }

    @media (max-width: 520px) {
      .portal-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <a class="wing-brand" href="customer-portal.html">
      <img src="../images/Logo.png" alt="YogiTrack Logo">
      <span class="wing-brand-name">YogiTrack</span>
      <span class="wing-brand-tagline">My Portal</span>
    </a>

    <div class="center-col">
      <nav class="topnav">
        <div class="nav-links">
          <a href="#" onclick="showSection('dashboard')" class="active">Dashboard</a>
          <a href="#" onclick="showSection('schedule')">Schedule</a>
          <a href="#" onclick="showSection('profile')">My Profile</a>
        </div>
        <a href="#" class="nav-logout" onclick="doLogout()">Log out</a>
      </nav>

      <!-- Dashboard -->
      <div class="content-panel" id="dashboardSection">
        <div class="welcome-name" id="welcomeName">Welcome back</div>

        <div class="portal-grid">
          <!-- Class Balance -->
          <div class="portal-card">
            <h3>Class Balance</h3>
            <div class="balance-number" id="balanceNumber">—</div>
            <div class="balance-label" id="balanceLabel">classes remaining</div>
          </div>

          <!-- Recent Check-ins -->
          <div class="portal-card">
            <h3>Recent Check-ins</h3>
            <ul class="checkin-list" id="checkinList">
              <li class="empty-msg">Loading...</li>
            </ul>
          </div>

          <!-- Upcoming Schedule preview -->
          <div class="portal-card" style="grid-column: 1 / -1;">
            <h3>Class Schedule</h3>
            <div class="schedule-page" id="dashSchedule">
              <p class="empty-msg">Loading...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Profile Section -->
      <div class="content-panel" id="profileSection" style="display:none;">
        <form class="card card--wide" id="profileForm">
          <h2>My Profile</h2>
          <div class="grid-2">
            <label>First Name <input type="text" id="profileFirstName"></label>
            <label>Last Name  <input type="text" id="profileLastName"></label>
          </div>
          <label>Address <textarea id="profileAddress" rows="2"></textarea></label>
          <div class="grid-2">
            <label>Phone <input type="tel" id="profilePhone"></label>
            <label>Email <input type="email" id="profileEmail" readonly style="background:#f0ebe4;"></label>
          </div>
          <fieldset>
            <legend>Preferred Contact</legend>
            <div class="radio-row">
              <label><input type="radio" name="profilePref" value="phone"> Phone</label>
              <label><input type="radio" name="profilePref" value="email"> Email</label>
            </div>
          </fieldset>
          <div class="btn-row">
            <button type="button" class="btn btn--primary" onclick="saveProfile()">Save Changes</button>
            <button type="button" class="btn" onclick="showSection('dashboard')">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Schedule Section -->
      <div class="content-panel" id="scheduleSection" style="display:none;">
        <div class="card card--wide">
          <h2>Class Schedule</h2>
          <div class="schedule-page" id="fullSchedule">
            <p class="empty-msg">Loading...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const DAYS_ORDER = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const DAY_FULL   = { Sun:"Sunday", Mon:"Monday", Tue:"Tuesday", Wed:"Wednesday", Thu:"Thursday", Fri:"Friday", Sat:"Saturday" };

    let currentCustomer  = null;
    let scheduleBuilt    = false;

    async function init() {
      try {
        const res  = await fetch('/api/auth/me');
        const data = await res.json();
        if (!data.loggedIn || data.user.role !== 'customer') {
          window.location.href = '/index.html';
          return;
        }

        const custRes   = await fetch('/api/portal/me');
        currentCustomer = await custRes.json();

        document.getElementById('welcomeName').textContent = `Welcome back, ${currentCustomer.firstName} ☀︎`;

        const bal   = currentCustomer.classBalance || 0;
        const balEl = document.getElementById('balanceNumber');
        const lblEl = document.getElementById('balanceLabel');
        balEl.textContent = bal;
        if (bal <= 0) {
          balEl.classList.add('balance-empty');
          lblEl.textContent = bal < 0 ? `balance — please see front desk` : 'no classes remaining';
        } else if (bal <= 2) {
          balEl.classList.add('balance-low');
          lblEl.textContent = 'classes remaining — renew soon';
        }

        loadCheckins();
        loadSchedule();

      } catch (err) {
        console.error('Portal init error:', err);
        window.location.href = '/index.html';
      }
    }

    async function loadCheckins() {
      try {
        const res      = await fetch('/api/portal/checkins');
        const checkins = await res.json();
        const list     = document.getElementById('checkinList');
        if (!checkins.length) { list.innerHTML = '<li class="empty-msg">No check-ins yet.</li>'; return; }
        list.innerHTML = checkins.slice(0, 5).map(c => {
          const dt        = new Date(c.checkinDatetime);
          const formatted = dt.toLocaleDateString([], { month:'short', day:'numeric', year:'numeric' });
          return `<li class="checkin-item">
            <span class="checkin-class">${c.classId}</span>
            <span class="checkin-date">${formatted}</span>
          </li>`;
        }).join('');
      } catch (err) {
        console.error('Failed to load checkins:', err);
      }
    }

    async function loadSchedule() {
      try {
        // Get all active classes
        const idsRes  = await fetch('/api/schedule/getClassIds');
        const ids     = await idsRes.json();
        if (!ids.length) {
          document.getElementById('dashSchedule').innerHTML  = '<p class="empty-msg">No classes scheduled.</p>';
          document.getElementById('fullSchedule').innerHTML  = '<p class="empty-msg">No classes scheduled.</p>';
          return;
        }

        // Fetch full class details
        const details = await Promise.all(
          ids.map(c => fetch(`/api/schedule/getClass?classId=${c.classId}`).then(r => r.json()))
        );

        // Fetch instructor names
        const instrRes     = await fetch('/api/customer/getInstructors');
        const instrIds     = await instrRes.json();
        const instrDetails = await Promise.all(
          instrIds.map(i => fetch(`/api/customer/getCustomer?customerId=${i.customerId}`).then(r => r.json()))
        );

        // Group by day
        const byDay = {};
        DAYS_ORDER.forEach(d => byDay[d] = []);
        details.forEach(cls => {
          (cls.daytime || []).forEach(dt => {
            if (byDay[dt.day] !== undefined) byDay[dt.day].push({ ...cls, _slot: dt });
          });
        });
        DAYS_ORDER.forEach(d => byDay[d].sort((a,b) => a._slot.time.localeCompare(b._slot.time)));

        const html = buildScheduleHTML(byDay, instrDetails);
        document.getElementById('dashSchedule').innerHTML = html;
        document.getElementById('fullSchedule').innerHTML = html;
        scheduleBuilt = true;

      } catch (err) {
        console.error('Failed to load schedule:', err);
      }
    }

    function buildScheduleHTML(byDay, instrDetails) {
      let html = '';
      DAYS_ORDER.forEach(day => {
        html += `<div class="day-block">
          <div class="day-heading">${DAY_FULL[day]}</div>`;

        if (!byDay[day].length) {
          html += `<div class="no-classes">No classes scheduled</div>`;
        } else {
          html += `<table class="schedule-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Class</th>
                <th>Instructor</th>
              </tr>
            </thead>
            <tbody>`;

          byDay[day].forEach(cls => {
            const slot      = cls._slot;
            const instr     = instrDetails.find(i => i.customerId === cls.instructorId);
            const instrName = instr ? `${instr.firstName} ${instr.lastName}` : '—';
            const [h, m]    = slot.time.split(':');
            const startMin  = parseInt(h)*60 + parseInt(m);
            const endMin    = slot.duration ? startMin + parseInt(slot.duration) : null;
            function fmt(t) {
              const hh = Math.floor(t/60)%24, mm = t%60;
              return `${hh%12||12}:${String(mm).padStart(2,'0')} ${hh>=12?'PM':'AM'}`;
            }
            const timeStr = endMin ? `${fmt(startMin)} – ${fmt(endMin)}` : fmt(startMin);
            const typeTag = cls.classType && cls.classType !== 'General'
              ? `<span class="class-type-tag">${cls.classType}</span>` : '';

            html += `<tr>
              <td style="white-space:nowrap;">${timeStr}</td>
              <td>${cls.className}${typeTag}</td>
              <td>${instrName}</td>
            </tr>`;
          });

          html += `</tbody></table>`;
        }
        html += `</div>`;
      });
      return html;
    }

    async function saveProfile() {
      try {
        const pref = document.querySelector('input[name="profilePref"]:checked');
        const body = {
          firstName:        document.getElementById('profileFirstName').value.trim(),
          lastName:         document.getElementById('profileLastName').value.trim(),
          phone:            document.getElementById('profilePhone').value.trim(),
          address:          document.getElementById('profileAddress').value.trim(),
          preferredContact: pref ? pref.value : 'email',
        };
        const res = await fetch('/api/portal/update', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Update failed');
        alert('✅ Profile updated!');
        showSection('dashboard');
        init();
      } catch (err) {
        alert('❌ Error: ' + err.message);
      }
    }

    function showSection(section) {
      document.getElementById('dashboardSection').style.display = section === 'dashboard' ? 'flex' : 'none';
      document.getElementById('profileSection').style.display   = section === 'profile'   ? 'flex' : 'none';
      document.getElementById('scheduleSection').style.display  = section === 'schedule'  ? 'flex' : 'none';

      document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
      if (section === 'dashboard') document.querySelectorAll('.nav-links a')[0].classList.add('active');
      if (section === 'schedule')  document.querySelectorAll('.nav-links a')[1].classList.add('active');
      if (section === 'profile')   document.querySelectorAll('.nav-links a')[2].classList.add('active');

      if (section === 'profile' && currentCustomer) {
        document.getElementById('profileFirstName').value = currentCustomer.firstName || '';
        document.getElementById('profileLastName').value  = currentCustomer.lastName  || '';
        document.getElementById('profilePhone').value     = currentCustomer.phone     || '';
        document.getElementById('profileAddress').value   = currentCustomer.address   || '';
        document.getElementById('profileEmail').value     = currentCustomer.email     || '';
        const pref = currentCustomer.preferredContact;
        document.querySelectorAll('input[name="profilePref"]').forEach(r => { r.checked = r.value === pref; });
      }
    }

    async function doLogout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/index.html';
    }

    init();
  </script>
</body>
</html>
